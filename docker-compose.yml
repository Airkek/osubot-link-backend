services:
  osubot-link-backend:
    build: .
    container_name: osubot-link-backend
    env_file: .env
    ports:
      - "9733:9733"
    depends_on:
      - osubot-link-db
    restart: unless-stopped
    networks:
      - osubot-network

  osubot-link-db:
    image: postgres:17-alpine
    container_name: osubot-link-backend-database
    environment:
      POSTGRES_DB: ${LINK_DB_NAME}
      POSTGRES_USER: ${LINK_DB_USER}
      POSTGRES_PASSWORD: ${LINK_DB_PASSWORD}
    volumes:
      - ./link_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - osubot-network

networks:
  osubot-network:
    driver: bridge
